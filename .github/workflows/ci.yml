name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: Lint + type-check (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Mypy --strict
        run: uv run mypy src/

  test:
    name: Tests (py${{ matrix.python-version }}, extras=${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        extras: ["dev", "dev,hostile"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra ${{ matrix.extras }}
        # Note: when extras=dev,hostile, the `[hostile]` extra pulls
        # Scrapling + Playwright; tests that exercise it should still
        # mock the Playwright session rather than launch a real browser.
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=85
      - name: Upload coverage to Codecov (informational)
        if: matrix.python-version == '3.13' && matrix.extras == 'dev'
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false

  pip-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --all-extras --dev
      - name: pip-audit
        run: uv run pip-audit --strict
        continue-on-error: false   # fail the build on any new CVE
