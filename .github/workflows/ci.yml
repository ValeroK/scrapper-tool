name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: Lint + type-check (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Mypy --strict
        run: uv run mypy src/

  test:
    name: Tests (py${{ matrix.python-version }}, extras=${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        # `agent` and `http` are included in every matrix entry:
        # - `agent` so test_mcp.py runs everywhere (MCP is first-class
        #   since v0.2.0, not optional flavor — without it the
        #   importorskip in test_mcp.py kicks in and mcp.py coverage
        #   drops below the 85% floor).
        # - `http` so test_http_server.py runs everywhere (REST sidecar
        #   is first-class since v1.1.0; without it http_server.py
        #   shows 0% coverage and drops the total below 85%).
        #
        # The `dev,full,agent,http` row exercises the lxml-override path
        # that the published Docker image and recommended SDK install
        # use. The lighter rows exist to catch regressions in à la
        # carte extras (some users still install `[hostile]` or
        # `[llm-agent]` on their own).
        extras:
          - "dev,agent,http"
          - "dev,hostile,agent,http"
          - "dev,llm-agent,agent,http"
          - "dev,full,agent,http"
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra ${{ matrix.extras }}
        # Note: when extras includes `hostile`, the `[hostile]` extra
        # pulls Scrapling + Playwright; tests that exercise it still
        # mock the Playwright session rather than launch a real browser.
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=85
      - name: Upload coverage to Codecov (informational)
        if: matrix.python-version == '3.13' && matrix.extras == 'dev,agent,http'
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: false

  pip-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv python install 3.13
      # `--all-extras` won't work: `[hostile]` and `[llm-agent]` are declared
      # as conflicting in pyproject.toml so each can lock independently; the
      # supported "everything" combo is `[full,agent,dev]` (which uses the
      # uv lxml override), matching the published Docker image and recommended
      # SDK install path.
      - run: uv sync --extra full --extra agent --extra dev
      - name: pip-audit
        # --skip-editable: don't try to look up the local package on PyPI.
        # NOTE: --strict is incompatible with --skip-editable in current
        # pip-audit (treats the editable install itself as a hard error).
        # Without --strict, pip-audit still exits non-zero on actual
        # CVE findings — the warning behaviour we trade away is for
        # "package not found on PyPI" cases, which is what we want.
        run: uv run pip-audit --skip-editable
        continue-on-error: false   # fail the build on any new CVE

  openapi-spec-check:
    name: OpenAPI spec is up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv python install 3.13
      - run: uv sync --extra dev --extra agent --extra full --extra http
      # Regenerate the spec; if it differs from what's committed, the
      # working tree will be dirty and `git diff --exit-code` fails.
      - run: uv run python scripts/dump_openapi.py
      - name: Fail if spec drifted
        run: |
          if ! git diff --exit-code docs/openapi/; then
            echo "::error::OpenAPI spec drifted. Run: uv run python scripts/dump_openapi.py and commit docs/openapi/."
            exit 1
          fi
