name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: Lint + type-check (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Mypy --strict
        run: uv run mypy src/

  test:
    name: Tests (py${{ matrix.python-version }}, extras=${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Trimmed from a 4×3 cartesian product to a 5-entry include list
        # to cut redundant CI work. Rationale:
        #
        # - `dev,full,agent,http` runs on EVERY Python (3.12/3.13/3.14)
        #   because it exercises the lxml-override path used by the
        #   published Docker image and the recommended SDK install. This
        #   is the row regressions are most likely to surface in.
        # - `dev,agent,http` runs ONLY on py3.13 — catches "I installed
        #   minimal scrapper-tool with no heavy extras" regressions.
        #   Tests skip via importorskip; this row verifies the lazy
        #   imports stay lazy.
        # - `dev,hostile,agent,http` runs ONLY on py3.13 — catches
        #   à la carte [hostile] (Pattern D / Scrapling) regressions
        #   without the lxml override.
        #
        # `[llm-agent]` à la carte intentionally NOT tested separately —
        # `[full]` exercises every Pattern E code path; the lxml conflict
        # story is what `[full]` uniquely covers.
        include:
          - { python-version: "3.12", extras: "dev,full,agent,http" }
          - { python-version: "3.13", extras: "dev,full,agent,http" }
          - { python-version: "3.14", extras: "dev,full,agent,http" }
          - { python-version: "3.13", extras: "dev,agent,http" }
          - { python-version: "3.13", extras: "dev,hostile,agent,http" }
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra ${{ matrix.extras }}
        # Note: when extras includes `hostile`, the `[hostile]` extra
        # pulls Scrapling + Playwright; tests that exercise it still
        # mock the Playwright session rather than launch a real browser.
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under=85
      - name: Upload coverage to Codecov (informational)
        if: matrix.python-version == '3.13' && matrix.extras == 'dev,agent,http'
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: false

  pip-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv python install 3.13
      # `--all-extras` won't work: `[hostile]` and `[llm-agent]` are declared
      # as conflicting in pyproject.toml so each can lock independently; the
      # supported "everything" combo is `[full,agent,dev]` (which uses the
      # uv lxml override), matching the published Docker image and recommended
      # SDK install path.
      - run: uv sync --extra full --extra agent --extra dev
      - name: pip-audit
        # --skip-editable: don't try to look up the local package on PyPI.
        # NOTE: --strict is incompatible with --skip-editable in current
        # pip-audit (treats the editable install itself as a hard error).
        # Without --strict, pip-audit still exits non-zero on actual
        # CVE findings — the warning behaviour we trade away is for
        # "package not found on PyPI" cases, which is what we want.
        run: uv run pip-audit --skip-editable
        continue-on-error: false   # fail the build on any new CVE

  openapi-spec-check:
    name: OpenAPI spec is up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv python install 3.13
      - run: uv sync --extra dev --extra agent --extra full --extra http
      # Regenerate the spec; if it differs from what's committed, the
      # working tree will be dirty and `git diff --exit-code` fails.
      - run: uv run python scripts/dump_openapi.py
      - name: Fail if spec drifted
        run: |
          if ! git diff --exit-code docs/openapi/; then
            echo "::error::OpenAPI spec drifted. Run: uv run python scripts/dump_openapi.py and commit docs/openapi/."
            exit 1
          fi
