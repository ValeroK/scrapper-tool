name: Docker image release

# Builds and pushes the bundled scrapper-tool image (Pattern A-E + MCP) to
# GitHub Container Registry on every v*.*.* tag. Tags pushed:
#   ghcr.io/valerok/scrapper-tool:<version>     e.g. 1.0.0
#   ghcr.io/valerok/scrapper-tool:<major>.<minor>  e.g. 0.3
#   ghcr.io/valerok/scrapper-tool:latest        (only on non-prerelease tags)
#
# Pulled by Docker users with:
#   docker pull ghcr.io/valerok/scrapper-tool:latest

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build + push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/scrapper-tool
          # tag triggers (v1.0.0) yield: 1.0.0, 1.0, latest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=scrapper-tool
            org.opencontainers.image.description=All five patterns (A/B/C/D/E) + MCP server in one image. Bring your own LLM.
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          # linux/amd64 only — Camoufox/Playwright Chromium binaries are not
          # available for arm64 in a slim variant we trust. Add arm64 later
          # if there's demand.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
