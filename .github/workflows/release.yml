name: Release to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publisher (OIDC)

jobs:
  build-and-publish:
    name: Build wheel + sdist, publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/scrapper-tool
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # tags must be visible for hatch-vcs / version derivation
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
      - run: uv python install 3.13
      - name: Build distribution
        run: uv build
      - name: Inspect built artefacts
        run: ls -la dist/
      - name: Publish to PyPI via OIDC trusted publisher
        uses: pypa/gh-action-pypi-publish@release/v1
        # No api-token: PyPI's trusted-publisher (OIDC) is configured for
        # this repo + workflow path. Set up via:
        #   https://pypi.org/manage/account/publishing/
        # Once configured, pushes of v*.*.* tags publish automatically.
